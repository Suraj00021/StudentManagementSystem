<!DOCTYPE html>
<html xmlns:th="http:www.thymeleaf.org" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Update Page</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
		integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    
</head>

<body>

	
	<nav class="navbar navbar-expand-md bg-dark navbar-dark">

	    <!-- Brand -->
	    <a class="navbar-brand" href="#">Student Management System</a>

	    <!-- Toggler/collapsible Button -->
	    <button class="navbar-toggler" type="button"
	            data-toggle="collapse"
	            data-target="#collapsibleNavbar">

	        <span class="navbar-toggler-icon"></span>
	    </button>

	    <!-- Navbar links -->
	    <div class="collapse navbar-collapse" id="collapsibleNavbar">

	        <ul class="navbar-nav">
	            <li class="nav-item">
	                <a class="nav-link" th:href="@{/students}">
	                    Student Management
	                </a>
	            </li>
	        </ul>

	    </div>

	</nav>
	
	
	
	
	
	
	
	<div class="container bg-white p-5 rounded shadow-lg">
	    
	    <div class="row">
			<div class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
				<div class="text-center" style="font-size: 30px;"><h3>Update Student</h3></div>
				<div class="card-body"></div>
	        
	        

	        <form th:action="@{/students/edit/{id} (id=${student.id})}" th:object="${student}" method="post">

	            <!-- First Name -->
	            <div class="mb-3">
	                <label for="firstName" class="form-label">
	                    Student First Name
	                </label>

	                <input 
	                    type="text"
	                    id="firstName"
	                    name="firstName"
	                    class="form-control" th:field="*{firstName}"
	                    placeholder="Enter First Name">
	            </div>


	            <!-- Last Name -->
	            <div class="mb-3">
	                <label for="lastName" class="form-label">
	                    Student Last Name
	                </label>

	                <input 
	                    type="text"
	                    id="lastName"
	                    name="lastName"
	                    class="form-control" th:field="*{lastName}"
	                    placeholder="Enter Last Name">
	            </div>


	            <!-- Email -->
	            <div class="mb-3 ">
	                <label for="email" class="form-label">
	                    Student Email
	                </label>

	                <input 
	                    type="email"
	                    id="email"
	                    name="email"
	                    class="form-control" th:field="*{email}"
	                    placeholder="Enter Your Email">
	            </div>


	            <!-- Submit Button -->
	            <div class="text-center">
	                <button type="submit" class="btn btn-success px-4 rounded-pill">
	                    Update
	                </button>
	            </div>

	        </form>
			
			</div>

	    </div>

	</div>

	
   
</body>
</html>
